services:
  minio:
    image: minio/minio:latest
    container_name: shopping-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - shopping_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shopping-net

  # MinIO 初始化：自动创建 bucket
  minio-init:
    image: minio/mc:latest
    container_name: shopping-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/shopping-products;
      mc mb --ignore-existing local/shopping-data;
      mc anonymous set download local/shopping-products;
      mc anonymous set private local/shopping-data;
      echo 'MinIO buckets ready';
      exit 0;
      "
    networks:
      - shopping-net

networks:
  shopping-net:
    name: shopping-net
    driver: bridge

volumes:
  shopping_minio_data: