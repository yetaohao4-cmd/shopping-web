# Main compose file — includes individual service definitions.
# Run:  docker compose up -d
# Or:   docker compose -f docker-compose.yml -f docker-compose.backend.yml ... up

include:
  - docker-compose.postgres.yml
  - docker-compose.minio.yml
  - docker-compose.backend.yml
  - docker-compose.frontend.yml

services:
  # Seed profile — imports CSV product data into the database
  seed:
    image: python:3.12-slim
    container_name: shopping-seed
    profiles: ["seed"]
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /workspace/backend
      DATABASE_URL: postgresql+asyncpg://shopping_user:shopping_password@postgres:5432/shopping
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET_PRODUCTS: shopping-products
      MINIO_BUCKET_DATA: shopping-data
      PUBLIC_MINIO_BASE_URL: http://localhost:9000
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_DEFAULT_TIMEOUT: "120"
      PIP_RETRIES: "10"
    volumes:
      - .:/workspace
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir -r backend/requirements-runtime.txt
        pip install --no-cache-dir python-jose[cryptography] bcrypt
        python import_csv_data.py
    networks:
      - shopping-net

networks:
  shopping-net:
    name: shopping-net
    driver: bridge

volumes:
  shopping_postgres_data:
  shopping_minio_data:
  frontend_node_modules:
  frontend_next_cache:
