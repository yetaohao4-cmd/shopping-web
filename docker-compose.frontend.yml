services:
  frontend:
    image: node:20-bookworm-slim
    container_name: shopping-frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEFAULT_REGION: cn
      TZ: Asia/Shanghai
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command:
      - /bin/sh
      - -c
      - >
        corepack enable
        && yarn install
        && yarn dev --hostname 0.0.0.0
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:8000/favicon.ico').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - shopping-net

networks:
  shopping-net:
    name: shopping-net
    driver: bridge

volumes:
  frontend_node_modules:
  frontend_next_cache:
